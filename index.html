<!DOCTYPE html>

<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="default">
<meta name="apple-mobile-web-app-title" content="Aujourd'hui">
<meta name="theme-color" content="#6B5B4E">
<title>Aujourd'hui</title>
<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:wght@300;400;600&family=Jost:wght@300;400;500&display=swap" rel="stylesheet">
<style>
*{box-sizing:border-box;margin:0;padding:0}
:root{
  --cr:#F7F3ED;--ta:#9C8B7A;--or:#C8A96E;--br:#6B5B4E;
  --wh:#FEFCF9;--bo:rgba(156,139,122,0.2);--gr:#4a7c59;--rd:#c0392b;--bg:#e8e2db
}
body{background:var(--bg);font-family:'Jost',sans-serif;min-height:100vh;overflow-x:hidden}
.app{max-width:860px;margin:0 auto;padding:16px 14px 90px}

.hd{text-align:center;padding:20px 0 16px}
.hd-mono{font-family:‘Cormorant Garamond’,serif;font-size:44px;font-weight:300;color:var(–br);letter-spacing:-2px}
.hd-mono span{color:var(–or)}
.hd-sub{font-size:9px;letter-spacing:5px;text-transform:uppercase;color:var(–ta);margin-top:3px}

.bottom-nav{position:fixed;bottom:0;left:0;right:0;background:var(–br);display:flex;z-index:99}
.bnav-tab{flex:1;padding:12px 0 8px;text-align:center;font-size:8px;letter-spacing:2px;text-transform:uppercase;color:rgba(247,243,237,.4);border:none;background:none;font-family:‘Jost’,sans-serif;cursor:pointer;display:flex;flex-direction:column;align-items:center;gap:3px}
.bnav-tab.on{color:var(–or)}
.bnav-icon{font-size:18px}

.stats-grid{display:grid;grid-template-columns:1fr 1fr;gap:8px;margin-bottom:12px}
.stat-box{background:var(–cr);padding:14px;position:relative}
.stat-box::before{content:’’;position:absolute;inset:5px;border:1px solid rgba(200,169,110,0.15);pointer-events:none}
.stat-num{font-family:‘Cormorant Garamond’,serif;font-size:26px;font-weight:300;color:var(–br);line-height:1}
.stat-num sup{font-size:12px;color:var(–or)}
.stat-lbl{font-size:8px;letter-spacing:2px;text-transform:uppercase;color:var(–ta);margin-top:4px}
.stat-info{font-size:10px;color:var(–ta);margin-top:2px;font-style:italic}

.banner{background:var(–br);padding:14px 18px;margin-bottom:18px}
.ban-title{font-size:8px;letter-spacing:3px;text-transform:uppercase;color:var(–or);margin-bottom:3px}
.ban-val{font-family:‘Cormorant Garamond’,serif;font-size:20px;font-weight:300;color:var(–cr)}
.ban-bar{height:2px;background:rgba(255,255,255,0.1);margin:8px 0 3px}
.ban-bar-fill{height:100%;background:linear-gradient(to right,var(–ta),var(–or))}
.ban-note{font-size:9px;color:rgba(247,243,237,.35)}

.sec-head{display:flex;justify-content:space-between;align-items:center;margin-bottom:14px}
.sec-title{font-family:‘Cormorant Garamond’,serif;font-size:20px;color:var(–br)}
.btn-new{background:var(–br);color:var(–cr);border:none;padding:10px 16px;font-family:‘Jost’,sans-serif;font-size:9px;letter-spacing:2px;text-transform:uppercase;cursor:pointer}

.filter-row{display:flex;gap:5px;margin-bottom:12px;overflow-x:auto;padding-bottom:2px}
.filter-row::-webkit-scrollbar{display:none}
.fbtn{background:none;border:1px solid var(–bo);color:var(–ta);padding:4px 10px;font-size:8px;letter-spacing:2px;text-transform:uppercase;cursor:pointer;font-family:‘Jost’,sans-serif;white-space:nowrap;flex-shrink:0}
.fbtn.on{background:var(–br);color:var(–cr);border-color:var(–br)}

.list{display:flex;flex-direction:column;gap:2px}
.empty{background:var(–cr);padding:36px;text-align:center;color:var(–ta);font-style:italic;font-family:‘Cormorant Garamond’,serif;font-size:17px}

.card{background:var(–cr);display:flex}
.card-stripe{width:4px;flex-shrink:0}
.card-body{flex:1;padding:12px 14px}
.card-name{font-family:‘Cormorant Garamond’,serif;font-size:18px;color:var(–br)}
.card-info{font-size:10px;color:var(–ta);margin-top:2px}
.card-tags{display:flex;gap:4px;margin-top:5px;flex-wrap:wrap}
.ctag{font-size:8px;padding:2px 6px;letter-spacing:1px;text-transform:uppercase}
.ct-f{background:rgba(200,169,110,0.15);color:var(–br)}
.ct-u{background:rgba(156,139,122,0.1);color:var(–ta)}
.ct-ok{background:rgba(74,124,89,0.12);color:var(–gr)}
.card-note{font-size:10px;color:var(–ta);margin-top:3px;font-style:italic}
.card-btns{display:flex;gap:5px;margin-top:7px}
.cbtn{background:none;border:1px solid var(–bo);color:var(–ta);padding:4px 10px;font-size:8px;cursor:pointer;font-family:‘Jost’,sans-serif;letter-spacing:1px;text-transform:uppercase}
.cbtn.del{border-color:transparent;color:rgba(192,57,43,.5)}
.card-right{padding:12px;display:flex;flex-direction:column;align-items:flex-end;justify-content:center;gap:2px;border-left:1px solid var(–bo);min-width:85px}
.card-total{font-family:‘Cormorant Garamond’,serif;font-size:19px;color:var(–br);font-weight:300}
.card-benef{font-size:9px;color:var(–gr)}
.card-ac{font-size:9px;color:var(–ta)}
.card-ac.ok{color:var(–gr)}
.sbadge{font-size:7px;letter-spacing:1px;text-transform:uppercase;padding:3px 6px;margin-top:3px}

.cal-nav{display:flex;align-items:center;justify-content:space-between;margin-bottom:14px}
.cal-m{font-family:‘Cormorant Garamond’,serif;font-size:24px;color:var(–br);font-weight:300}
.cal-nbtn{background:none;border:1px solid var(–bo);color:var(–ta);padding:7px 13px;cursor:pointer;font-size:11px;font-family:‘Jost’,sans-serif}
.cal-grid{display:grid;grid-template-columns:repeat(7,1fr);gap:2px}
.cal-hdr{text-align:center;font-size:8px;letter-spacing:1px;text-transform:uppercase;color:var(–ta);padding:5px 0}
.cal-day{background:var(–cr);min-height:55px;padding:5px;cursor:pointer}
.cal-day.today{outline:1px solid rgba(200,169,110,0.5);background:rgba(200,169,110,0.07)}
.cal-day.other{background:rgba(247,243,237,0.35)}
.cal-day.other .cal-dnum{color:rgba(156,139,122,0.3)}
.cal-dnum{font-size:11px;color:var(–ta);margin-bottom:2px}
.cal-ev{color:var(–cr);font-size:7px;padding:1px 4px;margin-bottom:1px;overflow:hidden;white-space:nowrap;text-overflow:ellipsis}
.cal-leg{display:flex;gap:10px;margin-top:12px;flex-wrap:wrap}
.cal-leg-i{display:flex;align-items:center;gap:4px;font-size:9px;color:var(–ta)}
.cal-dot{width:6px;height:6px;border-radius:50%;flex-shrink:0}

.rent-wrap{display:flex;flex-direction:column;gap:12px}
.rent-card{background:var(–cr);padding:18px}
.rent-title{font-size:8px;letter-spacing:3px;text-transform:uppercase;color:var(–or);margin-bottom:12px}
.rent-row{display:flex;justify-content:space-between;align-items:center;padding:8px 0;border-bottom:1px solid var(–bo)}
.rent-row:last-child{border-bottom:none}
.rent-lbl{font-size:12px;color:var(–ta)}
.rent-val{font-family:‘Cormorant Garamond’,serif;font-size:17px;color:var(–br)}
.rent-val.pos{color:var(–gr)}
.rent-val.neg{color:var(–rd)}
.rent-total{background:var(–br);padding:12px 16px;display:flex;justify-content:space-between;align-items:center;margin-top:8px}
.rt-lbl{font-size:8px;letter-spacing:2px;text-transform:uppercase;color:rgba(247,243,237,.4)}
.rt-val{font-family:‘Cormorant Garamond’,serif;font-size:22px;color:var(–or);font-weight:300}
.pbar-wrap{margin-top:10px}
.pbar-lbl{display:flex;justify-content:space-between;font-size:9px;color:var(–ta);margin-bottom:4px}
.pbar{height:4px;background:var(–bo)}
.pbar-fill{height:100%}
.ups-grid{display:grid;grid-template-columns:1fr 1fr;gap:8px;margin-top:12px}
.ups-item{background:rgba(200,169,110,0.07);padding:12px;text-align:center;border:1px solid rgba(200,169,110,0.15)}
.ups-nom{font-size:8px;letter-spacing:2px;text-transform:uppercase;color:var(–ta)}
.ups-val{font-family:‘Cormorant Garamond’,serif;font-size:20px;color:var(–or);font-weight:300;margin:3px 0}
.ups-info{font-size:9px;color:var(–br)}

.save-card{background:var(–cr);padding:18px;margin-bottom:12px}
.save-title{font-size:8px;letter-spacing:3px;text-transform:uppercase;color:var(–or);margin-bottom:10px}
.save-desc{font-size:11px;color:var(–ta);margin-bottom:12px;line-height:1.6}
.save-btns{display:flex;gap:8px}
.sbtn{flex:1;padding:11px;font-family:‘Jost’,sans-serif;font-size:9px;letter-spacing:2px;text-transform:uppercase;cursor:pointer;border:none}
.sbtn.main{background:var(–br);color:var(–cr)}
.sbtn.sec{background:none;border:1px solid var(–bo);color:var(–ta)}
.code-box{margin-top:10px;background:var(–wh);border:1px solid var(–bo);padding:10px;font-size:9px;color:var(–ta);word-break:break-all;font-family:monospace;max-height:80px;overflow-y:auto;display:none}
.import-box{margin-top:10px;display:none;flex-direction:column;gap:8px}
.import-box textarea{background:var(–wh);border:1px solid var(–bo);padding:10px;font-size:11px;color:var(–br);font-family:monospace;width:100%;min-height:70px;resize:vertical}
.ibtn{background:var(–gr);color:white;border:none;padding:11px;font-family:‘Jost’,sans-serif;font-size:9px;letter-spacing:2px;text-transform:uppercase;cursor:pointer;width:100%}

.overlay{position:fixed;inset:0;background:rgba(58,46,40,.7);z-index:200;display:flex;align-items:flex-end}
.modal{background:var(–cr);width:100%;max-height:93vh;overflow-y:auto;-webkit-overflow-scrolling:touch}
.mhd{padding:20px 18px 14px;border-bottom:1px solid var(–bo);position:sticky;top:0;background:var(–cr);z-index:1}
.mhd-t{font-family:‘Cormorant Garamond’,serif;font-size:22px;color:var(–br)}
.mhd-s{font-size:8px;letter-spacing:3px;text-transform:uppercase;color:var(–ta);margin-top:2px}
.mbody{padding:16px 18px;display:flex;flex-direction:column;gap:14px}
.field{display:flex;flex-direction:column;gap:4px}
.frow{display:grid;grid-template-columns:1fr 1fr;gap:10px}
.field label{font-size:8px;letter-spacing:3px;text-transform:uppercase;color:var(–ta)}
.field input,.field select,.field textarea{background:var(–wh);border:1px solid var(–bo);padding:11px 12px;font-family:‘Jost’,sans-serif;font-size:16px;color:var(–br);width:100%;-webkit-appearance:none;border-radius:0;outline:none}
.field input:focus,.field select:focus{border-color:var(–or)}
.field textarea{resize:vertical;min-height:60px;font-size:14px}
.field input.err{border-color:var(–rd)}
.errmsg{font-size:9px;color:var(–rd);margin-top:2px;display:none}
.hint{font-size:9px;color:var(–ta);margin-top:2px;font-style:italic}
.check-row{display:flex;align-items:center;gap:10px;padding:11px 13px;background:rgba(200,169,110,0.07);cursor:pointer}
.check-row input{width:17px;height:17px;accent-color:var(–or);flex-shrink:0;cursor:pointer}
.check-row label{font-size:13px;color:var(–br);flex:1;cursor:pointer}
.check-row .cp{font-family:‘Cormorant Garamond’,serif;font-size:17px;color:var(–or)}
.tot-box{background:var(–br);padding:12px 16px;display:flex;justify-content:space-between;align-items:center}
.tot-lbl{font-size:8px;letter-spacing:2px;text-transform:uppercase;color:rgba(247,243,237,.5)}
.tot-sub{font-size:10px;color:rgba(247,243,237,.35);margin-top:2px}
.tot-val{font-family:‘Cormorant Garamond’,serif;font-size:24px;color:var(–or);font-weight:300}
.benef-box{background:rgba(74,124,89,0.1);padding:9px 16px;display:flex;justify-content:space-between;align-items:center;border:1px solid rgba(74,124,89,0.2)}
.benef-lbl{font-size:8px;letter-spacing:2px;text-transform:uppercase;color:var(–gr)}
.benef-val{font-family:‘Cormorant Garamond’,serif;font-size:19px;color:var(–gr);font-weight:300}
.slbl{font-size:8px;letter-spacing:4px;text-transform:uppercase;color:var(–or);padding:0 0 9px;border-bottom:1px solid var(–bo)}
.mfoot{padding:14px 18px;border-top:1px solid var(–bo);display:flex;gap:7px;position:sticky;bottom:0;background:var(–cr)}
.mfoot-cancel{background:none;border:1px solid var(–bo);color:var(–ta);padding:12px 0;font-family:‘Jost’,sans-serif;font-size:9px;letter-spacing:2px;text-transform:uppercase;cursor:pointer;flex:1}
.mfoot-save{background:var(–br);color:var(–cr);border:none;padding:12px 0;font-family:‘Jost’,sans-serif;font-size:9px;letter-spacing:3px;text-transform:uppercase;cursor:pointer;flex:2}

.toast{position:fixed;top:16px;left:50%;transform:translateX(-50%);background:var(–br);color:var(–cr);padding:9px 18px;font-size:11px;z-index:300;opacity:0;transition:opacity .3s;pointer-events:none;white-space:nowrap}
.toast.show{opacity:1}
</style>

</head>
<body>

<div class="app">
  <div class="hd">
    <div class="hd-mono">A<span>/</span>J</div>
    <div class="hd-sub">AUJOURD'HUI &mdash; GESTION BUSINESS</div>
  </div>
  <div id="content"><div style="padding:30px;text-align:center;color:#9C8B7A">Chargement...</div></div>
</div>

<nav class="bottom-nav">
  <button class="bnav-tab on" id="tab-liste" onclick="setTab('liste')">
    <span class="bnav-icon">&#128203;</span>Liste
  </button>
  <button class="bnav-tab" id="tab-calendrier" onclick="setTab('calendrier')">
    <span class="bnav-icon">&#128197;</span>Calendrier
  </button>
  <button class="bnav-tab" id="tab-rentabilite" onclick="setTab('rentabilite')">
    <span class="bnav-icon">&#128202;</span>Renta
  </button>
  <button class="bnav-tab" id="tab-sauvegarde" onclick="setTab('sauvegarde')">
    <span class="bnav-icon">&#128190;</span>Sauvegarde
  </button>
</nav>

<div id="modal-wrap"></div>
<div class="toast" id="toast"></div>

<script>
// DATA
var FORMULES = [
  {id:"digital", label:"Full Digital", prix:195, desc:"Galerie digitale - QR Code", tirages:0},
  {id:"essentiel", label:"Essentiel", prix:250, desc:"250 tirages 5x15 cm", tirages:250},
  {id:"premium", label:"Premium", prix:350, desc:"390 tirages + galerie digitale", tirages:390}
];
var STATUTS = [
  {id:"confirmee", label:"Confirme", color:"#C8A96E"},
  {id:"acompte", label:"Acompte recu", color:"#9C8B7A"},
  {id:"solde", label:"Soldee", color:"#6B5B4E"},
  {id:"terminee", label:"Terminee", color:"#4a7c59"},
  {id:"annulee", label:"Annulee", color:"#c0392b"}
];
var TYPES = [
  {id:"mariage", label:"Mariage"},
  {id:"anniversaire", label:"Anniversaire"},
  {id:"entreprise", label:"Entreprise"},
  {id:"autre", label:"Autre"}
];
var CHARGES = [
  {label:"LumaBooth Pro", montant:20},
  {label:"DNP RX1HS", montant:90},
  {label:"WCM Plus + Medias", montant:43}
];
var MOIS = ["Janvier","Fevrier","Mars","Avril","Mai","Juin","Juillet","Aout","Septembre","Octobre","Novembre","Decembre"];
var JOURS = ["Lun","Mar","Mer","Jeu","Ven","Sam","Dim"];
var COUT_TIRAGE = 156.9 / 1400;

var reservations = [];
var currentTab = "liste";
var filterStatut = "all";
var calDate = new Date();
var editingId = null;
var formData = {};

// STORAGE
function saveData() {
  try { localStorage.setItem("aj_resa", JSON.stringify(reservations)); } catch(e) {}
}
function loadData() {
  try {
    var d = localStorage.getItem("aj_resa");
    if (d) { reservations = JSON.parse(d); }
  } catch(e) { reservations = []; }
}

// TOAST
function showToast(msg) {
  var t = document.getElementById("toast");
  t.textContent = msg;
  t.className = "toast show";
  setTimeout(function() { t.className = "toast"; }, 2500);
}

// CALC
function calcTotal(r) {
  var fm = null;
  for (var i=0;i<FORMULES.length;i++) { if (FORMULES[i].id===r.formule) { fm=FORMULES[i]; break; } }
  var base = fm ? fm.prix : 0;
  return base + (r.livreDor ? 195 : 0) + (Number(r.chaises)||0) + (Number(r.deplacement)||0);
}
function calcAcompte(r) { return Math.round(calcTotal(r)*0.3); }
function calcBenef(r) { return calcTotal(r) - (Number(r.consommables)||0) - (Number(r.deplacement)||0); }
function fmtNum(v) { return Number(v).toLocaleString("fr-FR"); }
function fmtDate(d) {
  if (!d) return "";
  var parts = d.split("-");
  if (parts.length !== 3) return d;
  var months = ["janvier","fevrier","mars","avril","mai","juin","juillet","aout","septembre","octobre","novembre","decembre"];
  return parseInt(parts[2]) + " " + months[parseInt(parts[1])-1] + " " + parts[0];
}
function dateKey(dt) {
  var y = dt.getFullYear();
  var m = String(dt.getMonth()+1);
  var day = String(dt.getDate());
  if (m.length<2) m="0"+m;
  if (day.length<2) day="0"+day;
  return y+"-"+m+"-"+day;
}
function getStatut(id) {
  for (var i=0;i<STATUTS.length;i++) { if (STATUTS[i].id===id) return STATUTS[i]; }
  return STATUTS[0];
}
function getFormule(id) {
  for (var i=0;i<FORMULES.length;i++) { if (FORMULES[i].id===id) return FORMULES[i]; }
  return FORMULES[0];
}

// TAB
function setTab(t) {
  currentTab = t;
  var tabs = document.querySelectorAll(".bnav-tab");
  for (var i=0;i<tabs.length;i++) { tabs[i].className = "bnav-tab"; }
  var el = document.getElementById("tab-"+t);
  if (el) el.className = "bnav-tab on";
  render();
}

// STATS HTML
function buildStats() {
  var actives = [];
  var terminees = [];
  for (var i=0;i<reservations.length;i++) {
    if (reservations[i].statut !== "annulee") actives.push(reservations[i]);
    if (reservations[i].statut === "terminee") terminees.push(reservations[i]);
  }
  var caTotal=0, caEncaisse=0, benefTotal=0;
  for (var i=0;i<actives.length;i++) caTotal += calcTotal(actives[i]);
  for (var i=0;i<terminees.length;i++) { caEncaisse += calcTotal(terminees[i]); benefTotal += calcBenef(terminees[i]); }
  var charges=0; for (var i=0;i<CHARGES.length;i++) charges += CHARGES[i].montant;
  var panier = actives.length > 0 ? Math.round(caTotal/actives.length) : 0;
  var pct = Math.min(100, actives.length*7);

  return '<div class="stats-grid">' +
    '<div class="stat-box"><div class="stat-num">'+actives.length+'</div><div class="stat-lbl">Reservations</div><div class="stat-info">'+terminees.length+' terminees</div></div>' +
    '<div class="stat-box"><div class="stat-num">'+fmtNum(caTotal)+'<sup> E</sup></div><div class="stat-lbl">CA Previsionnel</div><div class="stat-info">Saison 2026</div></div>' +
    '<div class="stat-box"><div class="stat-num">'+fmtNum(caEncaisse)+'<sup> E</sup></div><div class="stat-lbl">CA Encaisse</div><div class="stat-info">'+terminees.length+' evenements</div></div>' +
    '<div class="stat-box"><div class="stat-num">'+fmtNum(benefTotal)+'<sup> E</sup></div><div class="stat-lbl">Benefice net</div><div class="stat-info">Panier moy. '+fmtNum(panier)+'</div></div>' +
    '</div>' +
    '<div class="banner">' +
    '<div class="ban-title">SAISON 2026 - ILLIMITE</div>' +
    '<div class="ban-val">'+actives.length+' prestation'+(actives.length!==1?'s':'')+' - '+fmtNum(caTotal)+' E CA</div>' +
    '<div class="ban-bar"><div class="ban-bar-fill" style="width:'+pct+'%"></div></div>' +
    '<div class="ban-note">'+charges+' E charges/mois - 1 presta = rentable</div>' +
    '</div>';
}

// LISTE
function buildListe() {
  var filtered = [];
  for (var i=0;i<reservations.length;i++) {
    if (filterStatut==="all" || reservations[i].statut===filterStatut) filtered.push(reservations[i]);
  }
  filtered.sort(function(a,b) { return a.date > b.date ? 1 : -1; });

  var html = '<div class="sec-head"><div class="sec-title">Reservations</div><button class="btn-new" onclick="openAdd(\'\')">+ Nouveau</button></div>';

  html += '<div class="filter-row"><button class="fbtn'+(filterStatut==="all"?" on":"")+'" onclick="setFilter(\'all\')">Toutes</button>';
  for (var i=0;i<STATUTS.length;i++) {
    html += '<button class="fbtn'+(filterStatut===STATUTS[i].id?" on":"")+'" onclick="setFilter(\''+STATUTS[i].id+'\')">'+STATUTS[i].label+'</button>';
  }
  html += '</div>';

  if (filtered.length === 0) {
    html += '<div class="empty">Aucune reservation - appuyez sur + pour commencer</div>';
  } else {
    html += '<div class="list">';
    for (var i=0;i<filtered.length;i++) {
      var r = filtered[i];
      var st = getStatut(r.statut);
      var fm = getFormule(r.formule);
      var total = calcTotal(r);
      var benef = calcBenef(r);

// CALENDAR
function buildCal() {
  var year = calDate.getFullYear();
  var month = calDate.getMonth();
  var firstDay = new Date(year, month, 1);
  var lastDay = new Date(year, month+1, 0);
  var startDow = (firstDay.getDay()+6)%7;
  var today = new Date();

  var days = [];
  for (var i=0;i<startDow;i++) days.push({date:new Date(year,month,-startDow+i+1),cur:false});
  for (var i=1;i<=lastDay.getDate();i++) days.push({date:new Date(year,month,i),cur:true});
  var rem=7-(days.length%7); if(rem<7) for(var i=1;i<=rem;i++) days.push({date:new Date(year,month+1,i),cur:false});

  var html = '<div class="cal-nav">' +
    '<button class="cal-nbtn" onclick="prevMonth()">Prec.</button>' +
    '<div class="cal-m">'+MOIS[month]+' '+year+'</div>' +
    '<button class="cal-nbtn" onclick="nextMonth()">Suiv.</button>' +
    '</div>' +
    '<div style="display:flex;justify-content:flex-end;margin-bottom:10px"><button class="btn-new" onclick="openAdd(\'\')">+ Nouveau</button></div>' +
    '<div class="cal-grid">';

  for (var i=0;i<JOURS.length;i++) html += '<div class="cal-hdr">'+JOURS[i]+'</div>';

  for (var i=0;i<days.length;i++) {
    var d = days[i];
    var key = dateKey(d.date);
    var isToday = d.date.getDate()===today.getDate() && d.date.getMonth()===today.getMonth() && d.date.getFullYear()===today.getFullYear();
    var cls = "cal-day" + (!d.cur?" other":"") + (isToday?" today":"");

    html += '<div class="'+cls+'" onclick="openAdd(\''+key+'\')">';
    html += '<div class="cal-dnum">'+d.date.getDate()+'</div>';

    for (var j=0;j<reservations.length;j++) {
      var r = reservations[j];
      if (r.date === key) {
        var st = getStatut(r.statut);
        html += '<div class="cal-ev" style="background:'+st.color+'" onclick="event.stopPropagation();openEdit(\''+r.id+'\')">'+r.client+'</div>';
      }
    }
    html += '</div>';
  }
  html += '</div>';

  html += '<div class="cal-leg">';
  for (var i=0;i<STATUTS.length;i++) {
    html += '<div class="cal-leg-i"><div class="cal-dot" style="background:'+STATUTS[i].color+'"></div>'+STATUTS[i].label+'</div>';
  }
  html += '</div>';
  return html;
}

function prevMonth() { calDate=new Date(calDate.getFullYear(),calDate.getMonth()-1,1); render(); }
function nextMonth() { calDate=new Date(calDate.getFullYear(),calDate.getMonth()+1,1); render(); }

// RENTABILITE
function buildRent() {
  var actives = [], terminees = [];
  for (var i=0;i<reservations.length;i++) {
    if (reservations[i].statut!=="annulee") actives.push(reservations[i]);
    if (reservations[i].statut==="terminee") terminees.push(reservations[i]);
  }
  var caTotal=0, caEncaisse=0, benefTotal=0;
  for (var i=0;i<actives.length;i++) caTotal += calcTotal(actives[i]);
  for (var i=0;i<terminees.length;i++) { caEncaisse += calcTotal(terminees[i]); benefTotal += calcBenef(terminees[i]); }

  var caLivreDor=0, caChaises=0, caDepl=0, nbLivreDor=0, nbChaises=0;
  for (var i=0;i<actives.length;i++) {
    if (actives[i].livreDor) { caLivreDor+=195; nbLivreDor++; }
    if (actives[i].chaises>0) { caChaises+=Number(actives[i].chaises); nbChaises++; }
    caDepl += Number(actives[i].deplacement||0);
  }

  var charges=0; for (var i=0;i<CHARGES.length;i++) charges += CHARGES[i].montant;
  var amortPct = Math.min(100, Math.round((caEncaisse/4000)*100));
  var caPct = Math.min(100, Math.round((caTotal/4000)*100));

  var html = '<div class="rent-wrap">';

  html += '<div class="rent-card"><div class="rent-title">CHIFFRE D\'AFFAIRES</div>';
  for (var i=0;i<FORMULES.length;i++) {
    var f = FORMULES[i];
    var cnt=0, ca=0;
    for (var j=0;j<actives.length;j++) { if (actives[j].formule===f.id) { cnt++; ca+=calcTotal(actives[j]); } }
    html += '<div class="rent-row"><div class="rent-lbl">'+f.label+' x'+cnt+'</div><div class="rent-val">'+fmtNum(ca)+' E</div></div>';
  }
  html += '<div class="rent-row"><div class="rent-lbl">Livre d\'or ('+nbLivreDor+'x)</div><div class="rent-val">'+fmtNum(caLivreDor)+' E</div></div>';
  html += '<div class="rent-row"><div class="rent-lbl">Chaises Napoleon</div><div class="rent-val">'+fmtNum(caChaises)+' E</div></div>';
  html += '<div class="rent-row"><div class="rent-lbl">Deplacements</div><div class="rent-val">'+fmtNum(caDepl)+' E</div></div>';
  html += '<div class="rent-total"><div class="rt-lbl">CA TOTAL PREVISIONNEL</div><div class="rt-val">'+fmtNum(caTotal)+' E</div></div></div>';

  html += '<div class="rent-card"><div class="rent-title">CHARGES FIXES</div>';
  for (var i=0;i<CHARGES.length;i++) {
    html += '<div class="rent-row"><div class="rent-lbl">'+CHARGES[i].label+'</div><div class="rent-val neg">-'+CHARGES[i].montant+' E</div></div>';
  }
  html += '<div class="rent-row"><div class="rent-lbl">Total / mois</div><div class="rent-val neg">-'+charges+' E</div></div>';
  html += '<div class="rent-row"><div class="rent-lbl">CA encaisse</div><div class="rent-val pos">'+fmtNum(caEncaisse)+' E</div></div>';
  html += '<div class="rent-row"><div class="rent-lbl">Benefice net reel</div><div class="rent-val pos">'+fmtNum(benefTotal)+' E</div></div>';
  html += '<div class="rent-total"><div class="rt-lbl">1 PRESTA ESSENTIEL COUVRE</div><div class="rt-val">'+Math.round((250/charges)*100)+'% CHARGES</div></div></div>';

  html += '<div class="rent-card"><div class="rent-title">AMORTISSEMENT - 4000 E INVESTI</div>';
  html += '<div class="rent-row"><div class="rent-lbl">CA encaisse</div><div class="rent-val pos">'+fmtNum(caEncaisse)+' E</div></div>';
  html += '<div class="rent-row"><div class="rent-lbl">Restant</div><div class="rent-val neg">-'+fmtNum(Math.max(0,4000-caEncaisse))+' E</div></div>';
  html += '<div class="pbar-wrap"><div class="pbar-lbl"><span>Amortissement</span><span>'+amortPct+'%</span></div><div class="pbar"><div class="pbar-fill" style="width:'+amortPct+'%;background:linear-gradient(to right,#4a7c59,#6abf82)"></div></div></div>';
  html += '<div class="pbar-wrap"><div class="pbar-lbl"><span>CA previsionnel vs 4000E</span><span>'+caPct+'%</span></div><div class="pbar"><div class="pbar-fill" style="width:'+caPct+'%;background:linear-gradient(to right,#9C8B7A,#C8A96E)"></div></div></div>';
  html += '</div>';

  html += '<div class="rent-card"><div class="rent-title">UPSELLS</div><div class="ups-grid">';
  html += '<div class="ups-item"><div class="ups-nom">Livre d\'or</div><div class="ups-val">'+fmtNum(caLivreDor)+' E</div><div class="ups-info">'+nbLivreDor+' prestas - '+(actives.length>0?Math.round((nbLivreDor/actives.length)*100):0)+'% taux</div></div>';
  html += '<div class="ups-item"><div class="ups-nom">Chaises</div><div class="ups-val">'+fmtNum(caChaises)+' E</div><div class="ups-info">'+nbChaises+' prestas - '+(actives.length>0?Math.round((nbChaises/actives.length)*100):0)+'% taux</div></div>';
  html += '</div></div>';

  html += '</div>';
  return html;
}

function exportData() {
try {
var code = btoa(unescape(encodeURIComponent(JSON.stringify(reservations))));
var box = document.getElementById(“code-box”);
if (box) { box.textContent = code; box.style.display=“block”; }
if (navigator.clipboard) {
navigator.clipboard.writeText(code).then(function() { showToast(“Code copie !”); });
} else if (navigator.share) {
navigator.share({title:“Aujourd’hui reservations”, text:code});
} else {
showToast(“Code affiche ci-dessous - copiez le manuellement”);
}
} catch(e) { showToast(“Erreur export”); }
}

function toggleImport() {
var box = document.getElementById(“import-box”);
if (box) box.style.display = box.style.display===“flex” ? “none” : “flex”;
}

function importData() {
var txt = document.getElementById(“import-text”);
if (!txt || !txt.value.trim()) { showToast(“Collez un code de sauvegarde”); return; }
try {
var data = JSON.parse(decodeURIComponent(escape(atob(txt.value.trim()))));
if (!Array.isArray(data)) throw new Error(“Format invalide”);
reservations = data;
saveData();
showToast(data.length+” reservations importees !”);
render();
} catch(e) { showToast(“Code invalide”); }
}

formData.formule = val;

function saveResa() {
var fc = document.getElementById(“f-client”);
var fd = document.getElementById(“f-date”);
var fl = document.getElementById(“f-lieu”);
var fn = document.getElementById(“f-notes”);
var fs = document.getElementById(“f-statut”);
var ft = document.getElementById(“f-type”);
var fac = document.getElementById(“cb-ac”);
var fd2 = document.getElementById(“f-depl”);
var fch = document.getElementById(“f-chaises”);
var fco = document.getElementById(“f-conso”);

formData.client = fc ? fc.value.trim() : “”;
formData.date = fd ? fd.value : “”;
formData.lieu = fl ? fl.value : “”;
formData.notes = fn ? fn.value : “”;
formData.statut = fs ? fs.value : “confirmee”;
formData.typeEvent = ft ? ft.value : “mariage”;
formData.acompteRecu = fac ? fac.checked : false;
formData.deplacement = Number(fd2 ? fd2.value : 0)||0;
formData.chaises = Number(fch ? fch.value : 0)||0;
formData.consommables = Number(fco ? fco.value : 0)||0;

var ec = document.getElementById(“err-client”);
var ed = document.getElementById(“err-date”);
var hasErr = false;

if (!formData.client) {
if (ec) ec.style.display=“block”;
hasErr = true;
} else {
if (ec) ec.style.display=“none”;
}
if (!formData.date) {
if (ed) ed.style.display=“block”;
hasErr = true;
} else {
if (ed) ed.style.display=“none”;
}
if (hasErr) return;

if (editingId) {
for (var i=0;i<reservations.length;i++) {
if (reservations[i].id===editingId) { formData.id=editingId; reservations[i]=formData; break; }
}
showToast(“Reservation modifiee !”);
} else {
formData.id = String(Date.now());
reservations.push(formData);
showToast(“Reservation creee !”);
}
saveData();
closeModal();
render();
}
